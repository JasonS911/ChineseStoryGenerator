name: Generate Monthly HSK Stories

on:
  schedule:
    - cron: "0 3 1 * *" # Runs at 3:00 UTC on the 1st of each month
  workflow_dispatch: # Also allow manual run from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-selenium.txt

      - name: Generate monthly stories
        run: python generate_monthly_stories_selenium.py --headless

      - name: Install Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: List public folder contents
        run: ls -R public/

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting
